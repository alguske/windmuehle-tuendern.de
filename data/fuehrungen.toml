# Führungen / Guided tours data
# Time zone: Europe/Berlin (Hannover), always.
#
# Slot fields:
#   date         "YYYY-MM-DD"
#   time         "HH:MM"  (24h)
#   duration_min default 60
#   kind         "public" | "private"
#   status       "free" | "booked" | "cancelled"
#                 (private slots are always "booked" or "cancelled")
#   guide        first name(s) of the tour guide, e.g. "Dirk" or "Falk & Philipp"
#
# Edit this file to add / update / cancel tours.
# Run `zola build` locally to preview.
#
# Optional fields:
#   link  relative path or absolute URL; renders a "more info" link on the slot

