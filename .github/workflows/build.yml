name: Build check

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate fuehrungen data
        run: python scripts/validate-fuehrungen.py

      - name: Check i18n parity (DE/EN/ES)
        run: python scripts/check-i18n.py

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.0

      - name: Build with Zola
        run: zola build
